<!DOCTYPE html>
<html>
<head>
    <title>Test Token</title>
</head>
<body>
    <h1>Token Test</h1>
    <button onclick="testToken()">Test Current Token</button>
    <button onclick="reLogin()">Re-Login</button>
    <pre id="output"></pre>

    <script>
        function log(message) {
            document.getElementById('output').textContent += message + '\n';
        }

        async function testToken() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            log('=== TOKEN TEST ===');
            log('Token exists: ' + (token ? 'YES' : 'NO'));
            log('Token (first 50 chars): ' + (token ? token.substring(0, 50) + '...' : 'N/A'));
            log('User: ' + user);
            
            if (!token) {
                log('ERROR: No token found. Please login.');
                return;
            }

            // Test token with a simple API call
            try {
                const response = await fetch('http://localhost:5000/api/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                log('Profile API Status: ' + response.status);
                const data = await response.json();
                log('Profile API Response: ' + JSON.stringify(data, null, 2));
                
                if (response.ok) {
                    log('✓ Token is VALID');
                } else {
                    log('✗ Token is INVALID');
                }
            } catch (error) {
                log('ERROR: ' + error.message);
            }
        }

        async function reLogin() {
            log('=== RE-LOGIN ===');
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'ayub@gmail.com',
                        password: 'ayub123'
                    })
                });

                const data = await response.json();
                log('Login Status: ' + response.status);
                log('Login Response: ' + JSON.stringify(data, null, 2));

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    log('✓ New token saved to localStorage');
                    log('Please refresh your app and try again');
                }
            } catch (error) {
                log('ERROR: ' + error.message);
            }
        }
    </script>
</body>
</html>
